name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test when Metal is available
        run: |
          if ./build/tests/test_device; then
            ctest --test-dir build --output-on-failure
          else
            echo "No usable Metal device on this runner; skipping GPU tests."
          fi
      - name: Install smoke
        run: |
          cmake --install build --prefix "$RUNNER_TEMP/tensorcore-install"
          cmake --find-package \
            -DNAME=tensorcore \
            -DCOMPILER_ID=AppleClang \
            -DLANGUAGE=C \
            -DMODE=EXIST \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/tensorcore-install"
      - name: Python package smoke
        run: |
          python3 -m pip install -e . --no-build-isolation
          TENSORCORE_LIB="$RUNNER_TEMP/tensorcore-install/lib/libtensorcore.dylib" \
            python3 -c 'import tensorcore as tc; print(tc.version())'

  build-macos-15:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Test when Metal is available
        run: |
          if ./build/tests/test_device; then
            ctest --test-dir build --output-on-failure
          else
            echo "No usable Metal device on this runner; skipping GPU tests."
          fi
      - name: Install smoke
        run: |
          cmake --install build --prefix "$RUNNER_TEMP/tensorcore-install"
          cmake --find-package \
            -DNAME=tensorcore \
            -DCOMPILER_ID=AppleClang \
            -DLANGUAGE=C \
            -DMODE=EXIST \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/tensorcore-install"
      - name: Python package smoke
        run: |
          python3 -m pip install -e . --no-build-isolation
          TENSORCORE_LIB="$RUNNER_TEMP/tensorcore-install/lib/libtensorcore.dylib" \
            python3 -c 'import tensorcore as tc; print(tc.version())'
