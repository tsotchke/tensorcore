name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Version consistency
        run: scripts/check_version_consistency.sh

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Prepare release Python
        run: |
          python3 -m venv "$RUNNER_TEMP/tensorcore-release-venv"
          "$RUNNER_TEMP/tensorcore-release-venv/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Release smoke
        env:
          PYTHON_BIN: ${{ runner.temp }}/tensorcore-release-venv/bin/python
          PREFIX: ${{ runner.temp }}/tensorcore-native-sdk
          WHEEL_DIR: dist
          TENSORCORE_RELEASE_SMOKE_EVIDENCE_PATH: build/release_smoke_runtime_evidence.json
        run: scripts/release_smoke.sh

      - name: Check runtime evidence
        run: python3 scripts/check_release_evidence.py build/release_smoke_runtime_evidence.json

      - name: Create native SDK archive
        env:
          PYTHON_BIN: ${{ runner.temp }}/tensorcore-release-venv/bin/python
          OUT_DIR: dist
        run: |
          archive="$(scripts/create_native_sdk_archive.sh "$RUNNER_TEMP/tensorcore-native-sdk")"
          scripts/check_native_sdk_archive.sh "$archive"

      - name: Create release checksums
        run: scripts/create_release_checksums.sh dist

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tensorcore-release-smoke-evidence
          path: build/release_smoke_runtime_evidence.json
          if-no-files-found: error

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: tensorcore-apple-wheel
          path: dist/tensorcore_apple-*.whl
          if-no-files-found: error

      - name: Upload native SDK artifact
        uses: actions/upload-artifact@v7
        with:
          name: tensorcore-native-sdk
          path: dist/tensorcore-native-sdk-*.tar.gz
          if-no-files-found: error

      - name: Upload release checksums
        uses: actions/upload-artifact@v7
        with:
          name: tensorcore-release-checksums
          path: dist/SHA256SUMS
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated tensorcore release for $GITHUB_REF_NAME."
          gh release upload "$GITHUB_REF_NAME" \
            dist/tensorcore_apple-*.whl \
            dist/tensorcore-native-sdk-*.tar.gz \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" --clobber
