name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Version consistency
        run: scripts/check_version_consistency.sh

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Public export surface
        run: scripts/check_public_exports.sh

      - name: Hardware-aware tests
        run: scripts/ci_macos_test.sh

      - name: Install native artifacts
        run: cmake --install build --prefix "$RUNNER_TEMP/tensorcore-install"

      - name: Build wheel
        run: |
          python3 -m venv "$RUNNER_TEMP/tensorcore-release-venv"
          source "$RUNNER_TEMP/tensorcore-release-venv/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          mkdir -p dist
          TENSORCORE_NATIVE_DIR="$RUNNER_TEMP/tensorcore-install/lib" \
            python -m pip wheel . --no-build-isolation -w dist

      - name: Verify wheel
        run: |
          source "$RUNNER_TEMP/tensorcore-release-venv/bin/activate"
          python -m pip install dist/tensorcore_apple-*.whl --force-reinstall --no-deps
          EXPECTED_VERSION="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', text)
          if not match:
              raise SystemExit("project.version not found in pyproject.toml")
          print(match.group(1))
          PY
          )"
          TENSORCORE_LIB= TC_METALLIB= \
            python - "$EXPECTED_VERSION" <<'PY'
          import sys
          import tensorcore as tc

          expected = sys.argv[1]
          actual = tc.version()
          if not actual.startswith(f"tensorcore {expected}"):
              raise SystemExit(f"version mismatch: expected tensorcore {expected}, got {actual}")
          print(actual)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: tensorcore-apple-wheel
          path: dist/tensorcore_apple-*.whl
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated tensorcore release for $GITHUB_REF_NAME."
          gh release upload "$GITHUB_REF_NAME" dist/tensorcore_apple-*.whl \
            --repo "$GITHUB_REPOSITORY" --clobber
